services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: dfd_builder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Ganesh@24}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dfd_builder"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dfd-network

  redis:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dfd-network

  backend:
    build:
      context: ./Backend/tool
      dockerfile: Dockerfile
    container_name: springboot-backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/dfd_builder
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD:-Ganesh@24}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-ganeshkolare5@gmail.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-dlvpohcjjtvhwzfc}
      - JWT_SECRET=${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - dfd-network

  frontend:
    build:
      context: ./Frontend
    container_name: react-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dfd-network

  ai-service:
    build:
      context: ./ai-service
    container_name: python-ai-service
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dfd-network

networks:
  dfd-network:
    driver: bridge
