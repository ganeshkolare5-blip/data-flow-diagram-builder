<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Summary</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #1e293b; line-height: 1.6; }
        .container { max-width: 600px; margin: 40px auto; padding: 30px; background-color: #fff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        h2 { color: #6366f1; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .diagram-item { padding: 15px; margin-bottom: 10px; background-color: #f1f5f9; border-radius: 8px; }
        .diagram-name { font-weight: bold; color: #334155; }
        .diagram-desc { font-size: 0.9em; color: #64748b; }
        .footer { margin-top: 30px; font-size: 12px; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Your Daily Diagram Summary</h2>
        <p>Hello <span th:text="${userName}">User</span>,</p>
        <p>You have <strong th:text="${diagrams.size()}">0</strong> active diagrams to review today:</p>
        
        <div th:each="diagram : ${diagrams}" class="diagram-item">
            <div class="diagram-name" th:text="${diagram.name}">Diagram Name</div>
            <div class="diagram-desc" th:text="${diagram.description}">Description</div>
        </div>

        <p>Keep building great things!</p>
        
        <div class="footer">
            <p>&copy; 2026 DFD Builder Pro. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
