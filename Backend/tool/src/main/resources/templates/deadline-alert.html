<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Deadline Alert</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-top: 5px solid #dc3545;
        }
        h2 {
            color: #dc3545;
        }
        .alert-box {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #f5c6cb;
            margin: 15px 0;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Deadline Approaching!</h2>
        <p>Hello,</p>
        <div class="alert-box">
            <p>Your diagram <strong><span th:text="${diagramName}">Diagram Name</span></strong> has a deadline approaching.</p>
            <p><strong>Deadline:</strong> <span th:text="${deadline}">2026-05-04</span></p>
        </div>
        <p>Please take necessary actions before the deadline passes.</p>
        <div class="footer">
            <p>&copy; 2026 Data Flow Diagram Builder. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
