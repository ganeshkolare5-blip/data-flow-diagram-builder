<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Reminder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #0056b3;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Daily Reminder</h2>
        <p>Hello,</p>
        <p>This is your daily reminder for your diagram: <strong th:text="${diagramName}">Diagram Name</strong></p>
        <p><strong>Description:</strong> <span th:text="${description}">Description here</span></p>
        <p>Please review your diagram and make sure everything is up to date.</p>
        <div class="footer">
            <p>&copy; 2026 Data Flow Diagram Builder. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
